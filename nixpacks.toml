# ═══════════════════════════════════════════════════
# SparkLead — Nixpacks build config for Railway
# Installs Chromium dependencies for Puppeteer
# ═══════════════════════════════════════════════════

[phases.setup]
aptPkgs = [
  'fonts-liberation',
  'libasound2',
  'libatk-bridge2.0-0',
  'libatk1.0-0',
  'libcups2',
  'libdbus-1-3',
  'libdrm2',
  'libgbm1',
  'libgtk-3-0',
  'libnspr4',
  'libnss3',
  'libx11-xcb1',
  'libxcomposite1',
  'libxcursor1',
  'libxdamage1',
  'libxfixes3',
  'libxi6',
  'libxrandr2',
  'libxss1',
  'libxtst6',
  'xdg-utils',
  'wget',
  'ca-certificates'
]

[phases.install]
cmds = ['npm ci || npm install', 'npx puppeteer browsers install chrome']
